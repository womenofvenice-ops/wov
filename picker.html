<!DOCTYPE html>
<!-- Women of Venice — Photo Picker v1.1 · she taps hearts, her picks email themselves -->
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scegli le tue preferite — Women of Venice</title>
<style>
  :root{ --cream:#F4ECDE; --ink:#1C2B2C; --inkS:#5A6667; --red:#A8492E; --peach:#E09A73; }
  *{ box-sizing:border-box; margin:0; }
  body{ font-family:Georgia,'Times New Roman',serif; background:var(--cream); color:var(--ink); min-height:100vh; }
  .wrap{ max-width:640px; margin:0 auto; padding:22px 14px 60px; }
  h1{ font-size:21px; text-align:center; letter-spacing:.04em; margin-bottom:4px; }
  .sub{ font-family:Arial,sans-serif; font-size:10.5px; text-transform:uppercase; letter-spacing:.26em; color:var(--peach); text-align:center; margin-bottom:16px; }
  .hint{ font-family:Arial,sans-serif; font-size:13.5px; color:var(--inkS); text-align:center; line-height:1.5; margin-bottom:18px; }
  .count{ position:sticky; top:0; z-index:5; background:var(--cream); padding:10px 0; text-align:center;
    font-family:Arial,sans-serif; font-size:14px; font-weight:700; color:var(--red); border-bottom:1px solid rgba(28,43,44,.12); margin-bottom:14px; }
  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .ph{ position:relative; border-radius:14px; overflow:hidden; background:#e8dfcd; cursor:pointer; border:3px solid transparent; }
  .ph img{ width:100%; display:block; aspect-ratio:3/4; object-fit:cover; }
  .ph .hh{ position:absolute; top:8px; right:8px; font-size:26px; filter:drop-shadow(0 1px 2px rgba(0,0,0,.4)); }
  .ph .nm{ position:absolute; left:8px; bottom:6px; font-family:Arial,sans-serif; font-size:11px; color:#fff; text-shadow:0 1px 2px rgba(0,0,0,.6); }
  .ph.sel{ border-color:var(--red); }
  .btn{ display:block; width:100%; margin-top:22px; padding:16px; border:none; border-radius:18px;
    font-family:Arial,sans-serif; font-size:16px; font-weight:700; color:var(--ink); cursor:pointer;
    background:linear-gradient(135deg,#F6CDAB 0%,#EFB98F 45%,#E09A73 100%); box-shadow:inset 0 1px 0 rgba(255,255,255,.45); }
  .btn:disabled{ opacity:.45; }
  .done{ text-align:center; padding:60px 20px; }
  .done .big{ font-size:44px; margin-bottom:14px; }
  .motto{ font-style:italic; text-align:center; color:var(--red); margin-top:26px; font-size:14.5px; }
  .load{ text-align:center; font-family:Arial,sans-serif; color:var(--inkS); padding:40px 0; }
</style>
</head>
<body>
<div class="wrap" id="app"><div class="load">Caricamento… / Loading…</div></div>
<script>
(function(){
  var EXEC = "https://script.google.com/macros/s/AKfycbw8oG_NW-pYFDE9Tb9BkTUKGacfhW0lILsxfjvQ8qx-QZJGIYet99GkIyrSHZhcRxM/exec";
  var Q = new URLSearchParams(location.search);
  var fid = Q.get("fid")||"", name = Q.get("n")||"", lang = (Q.get("lang")==="en")?"en":"it", eid = Q.get("eid")||"";
  var T = lang==="en" ? {
    t:"Pick your favourites", h:"Tap the \u2764 on the photos you love most \u2014 choose between 5 and 20 \u2014 then press Send. That's all!",
    c1:"selected", send:"Send my favourites \u2192", min:"Pick at least 5 \u2764", max:"Maximum 20 \u2014 remove one first \ud83d\ude0a",
    ty:"Sent! Grazie!", ty2:"Your choices are on their way \u2014 the final photos will follow soon. \u2728", err:"Couldn't load the photos \u2014 try opening the link again."
  } : {
    t:"Scegli le tue preferite", h:"Tocca il \u2764 sulle foto che ami di pi\u00f9 \u2014 scegline da 5 a 20 \u2014 poi premi Invia. Tutto qui!",
    c1:"selezionate", send:"Invia le mie preferite \u2192", min:"Scegline almeno 5 \u2764", max:"Massimo 20 \u2014 togline una prima \ud83d\ude0a",
    ty:"Inviate! Grazie!", ty2:"Le tue scelte sono in viaggio \u2014 le foto finali arriveranno presto. \u2728", err:"Non riesco a caricare le foto \u2014 riapri il link e riprova."
  };
  var files=[], sel={};
  var app=document.getElementById("app");

  window.wovList = function(data){
    files = (data && data.files) || [];
    if(!files.length){ app.innerHTML='<div class="load">'+T.err+'</div>'; return; }
    render();
  };
  function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  function count(){ return Object.keys(sel).length; }
  function render(){
    var greet = name ? (lang==="en" ? "Ciao "+esc(name)+"!" : "Ciao "+esc(name)+"!") : "";
    var grid = files.map(function(f,i){
      var on = !!sel[f.id];
      return '<div class="ph'+(on?' sel':'')+'" data-i="'+i+'">'+
        '<img loading="lazy" src="https://drive.google.com/thumbnail?id='+f.id+'&sz=w600" alt="">'+
        '<div class="hh">'+(on?'\u2764\ufe0f':'\ud83e\udd0d')+'</div>'+
        '<div class="nm">'+esc(f.name.replace(/\.[a-z]+$/i,""))+'</div></div>';
    }).join("");
    app.innerHTML =
      '<h1>'+greet+' '+T.t+'</h1><div class="sub">Women of Venice \u00b7 Portraits &amp; stories</div>'+
      '<div class="hint">'+T.h+'</div>'+
      '<div class="count"><span id="cnt">'+count()+'</span> '+T.c1+'</div>'+
      '<div class="grid">'+grid+'</div>'+
      '<button class="btn" id="send">'+T.send+'</button>'+
      '<div class="motto">\u2726 I\u2019ll steal you from Chronos \u2014 and give you Kairos.</div>';
    Array.prototype.forEach.call(document.querySelectorAll(".ph"), function(el){
      el.onclick = function(){
        var f = files[+el.getAttribute("data-i")];
        if(sel[f.id]) delete sel[f.id];
        else {
          if(count()>=20){ alert(T.max); return; }
          sel[f.id]=f.name;
        }
        render(); window.scrollTo(0, window.scrollY);
      };
    });
    document.getElementById("send").onclick = function(){
      if(count()<5){ alert(T.min); return; }
      var picks = Object.values(sel).sort();
      fetch(EXEC, { method:"POST", mode:"no-cors",
        headers:{ "Content-Type":"text/plain;charset=utf-8" },
        body: JSON.stringify({ action:"picks", record:{ fid:fid, name:name, lang:lang, id:eid, picks:picks } }) });
      app.innerHTML = '<div class="done"><div class="big">\u2764\ufe0f</div><h1>'+T.ty+'</h1>'+
        '<div class="hint" style="margin-top:10px">'+T.ty2+'</div>'+
        '<div class="motto">\u2726 I\u2019ll steal you from Chronos \u2014 and give you Kairos.</div></div>';
    };
  }
  // JSONP load
  var s=document.createElement("script");
  s.src = EXEC + "?action=list&fid=" + encodeURIComponent(fid) + "&callback=wovList";
  s.onerror = function(){ app.innerHTML='<div class="load">'+T.err+'</div>'; };
  document.body.appendChild(s);
})();
</script>
</body>
</html>
