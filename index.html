<style>
  #wov-app, #wov-app * { box-sizing: border-box; margin: 0; -webkit-tap-highlight-color: transparent; }
  #wov-app {
    --cream:#F4ECDE; --creamD:#EAE0CD; --ink:#1C2B2C;
    --inkS:rgba(28,43,44,.62); --inkF:rgba(28,43,44,.32);

    background:var(--creamD); min-height:100vh; display:flex; justify-content:center;
  }
  #wov-app .wrap { width:100%; max-width:440px; background:var(--cream); min-height:100vh; padding:20px 18px 40px; }
  #wov-app .serif { font-family:Georgia,'Times New Roman',serif; }
  #wov-app .lbl { font-size:11px; text-transform:uppercase; letter-spacing:.14em; color:var(--inkS); margin-bottom:6px; }

    letter-spacing:.02em; color:var(--ink); background:var(--grad); box-shadow:inset 0 1px 0 rgba(255,255,255,.45); cursor:pointer; }
  #wov-app .btn:active { opacity:.7; } #wov-app .btn[disabled] { opacity:.4; pointer-events:none; }
  #wov-app .btn.ghost { background:transparent; border:1.5px solid var(--inkF); box-shadow:none; }
  #wov-app .btn.danger { background:transparent; border:1.5px solid #B3261E; color:#B3261E; box-shadow:none; }
  #wov-app input[type=text], #wov-app input[type=email], #wov-app input[type=tel], #wov-app input[type=number], #wov-app input[type=url], #wov-app textarea {
    width:100%; padding:14px 16px; border:1.5px solid var(--inkF); border-radius:14px; font-size:16px; color:var(--ink);
    background:#fff; outline:none; }
  #wov-app .card { background:#fff; border:1.5px solid var(--inkF); border-radius:18px; padding:16px; }
  #wov-app .soft { background:var(--creamD); border-radius:18px; padding:16px; }
  #wov-app .row { display:flex; align-items:center; gap:12px; }

  #wov-app .box { flex-shrink:0; width:24px; height:24px; border-radius:7px; border:2px solid var(--inkF);
    display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; color:var(--ink); margin-top:1px; }
  #wov-app .box.on { border-color:#E09A73; background:var(--grad); }
  #wov-app .badge { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em;
    padding:5px 11px; border-radius:99px; color:var(--ink); }
  #wov-app .lang { display:flex; border:1.5px solid var(--inkF); border-radius:99px; overflow:hidden; }
  #wov-app .lang button { padding:7px 15px; border:none; background:transparent; font-size:12px; font-weight:700;
    text-transform:uppercase; letter-spacing:.08em; color:var(--ink); opacity:.5; cursor:pointer; }
  #wov-app .lang button.on { background:var(--grad); opacity:1; }
  #wov-app .top { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
  #wov-app .back { font-size:26px; background:none; border:none; color:var(--ink); cursor:pointer; padding:0 4px; }

  #wov-app .info { display:flex; justify-content:space-between; gap:16px; padding:10px 0; border-bottom:1px solid var(--creamD); }

<script>
(function () {
  // ——— identity enforcement (title + icon), for wrapped hosting ———
  try {
    document.title = "WoV — Women of Venice";
    var iconHref = (document.querySelector('#wov-app') && true) ? (function(){
      var l = document.querySelector('link[rel="apple-touch-icon"]');
      return l ? l.href : null; })() : null;
    if (iconHref) {
      ["icon","shortcut icon","apple-touch-icon"].forEach(function(rel){

  } catch(e) {}

  // ——— storage chain: Claude account (in chat) → browser localStorage (downloaded file) → session memory ———
  const mem = {};
  const memStore = {
    async get(k){ if(!(k in mem)) throw new Error('nf'); return {value:mem[k]}; },
    async set(k,v){ mem[k]=v; return {}; },
    async delete(k){ delete mem[k]; return {}; },
    async list(p){ return { keys:Object.keys(mem).filter(k=>k.startsWith(p)) }; }
  };
  function makeStore(){
    if (window.storage) return window.storage;
    try {
      const ls = window.localStorage;
      ls.setItem('__wovt','1'); ls.removeItem('__wovt');
      return {
        async get(k){ const v=ls.getItem('wov:'+k); if(v===null) throw new Error('nf'); return {value:v}; },
        async set(k,v){ ls.setItem('wov:'+k,v); return {}; },
        async delete(k){ ls.removeItem('wov:'+k); return {}; },
        async list(p){ const keys=[]; for(let i=0;i<ls.length;i++){ const k=ls.key(i); if(k && k.indexOf('wov:'+p)===0) keys.push(k.slice(4)); } return {keys}; }
      };

    return `<a href="${wa}" target="_blank" style="color:var(--red);font-weight:600;text-decoration:none">${esc(p)} \ud83d\udcac</a>`; };

  const QCAPS={
    gold:{it:["L'ora d'oro a Venezia dura venti minuti. Ma vale il viaggio intero.","La luce giusta non si cerca. Si aspetta.","Quando Venezia si accende, basta esserci."],

  async function syncEnc(e){

    }catch(err){ return { ok:false, reason:"net", msg:String(err) }; }

  // ——— export ———
  function download(name, text, type){
    const blob = new Blob([text], {type});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = name;
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 400);
  }
  function exportAll(){
    const rows = [["id","type","created","name","email","instagram","phone","status","social","portfolio","prints","book","commercial","name_story","story","gps_lat","gps_lng","tfp_images","tfp_days","tfp_credit","synced"]];
    S.encs.forEach(e=>{
      rows.push([e.id,e.type,new Date(e.createdAt).toISOString(),e.name,e.email,e.ig,e.phone,e.status,
        e.scopes.social,e.scopes.portfolio,e.scopes.prints,e.scopes.book,e.scopes.commercial,e.nameStory,
        (e.story||"").replace(/\r?\n/g," "),
        e.gps?e.gps.lat:"", e.gps?e.gps.lng:"",
        e.tfp?e.tfp.count:"", e.tfp?e.tfp.days:"", e.tfp?e.tfp.credit:"",
        e.synced?new Date(e.synced).toISOString():""]);
    });
    const csv = rows.map(r=>r.map(v=>{ v=String(v==null?"":v); return /[",\n;]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; }).join(",")).join("\n");
    const stamp = new Date().toISOString().slice(0,10);
    download("wov-encounters-"+stamp+".csv", "\uFEFF"+csv, "text/csv;charset=utf-8");
    download("wov-encounters-full-"+stamp+".json", JSON.stringify(S.encs,null,2), "application/json");
  }

  // ——— signature pad ———
  function initSig(){
    const cv=document.getElementById("sig"); if(!cv) return;
    const dpr=window.devicePixelRatio||1, w=cv.offsetWidth, h=170;
    cv.width=w*dpr; cv.height=h*dpr;
    const ctx=cv.getContext("2d"); ctx.scale(dpr,dpr);
    ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h);
    ctx.strokeStyle="#1C2B2C"; ctx.lineWidth=2.4; ctx.lineCap="round"; ctx.lineJoin="round";
    if(S.draft && S.draft.signature){ const img=new Image(); img.onload=()=>ctx.drawImage(img,0,0,w,h); img.src=S.draft.signature; }
    let on=false;
    const pos=e=>{ const r=cv.getBoundingClientRect(); return {x:e.clientX-r.left,y:e.clientY-r.top}; };
    cv.onpointerdown=e=>{ on=true; const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); cv.setPointerCapture(e.pointerId); };
    cv.onpointermove=e=>{ if(!on) return; const p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); };
    const end=()=>{ if(on){ on=false; S.draft.signature=cv.toDataURL("image/png"); const b=document.getElementById("btn-sign"); if(b) b.disabled=!(S.draft.name.trim().length>2&&S.draft.ageOk&&S.draft.signature); } };
    cv.onpointerup=end; cv.onpointerleave=end;
  }

  function bindDraftInputs(){
    const map={ "f-name":"name","f-email":"email","f-ig":"ig","f-phone":"phone","f-story":"story" };
    Object.entries(map).forEach(([id,key])=>{
      const n=document.getElementById(id);
      if(n) n.oninput=()=>{ S.draft[key]=n.value;
        if(key==="name"){ const b=document.getElementById("btn-sign"); if(b) b.disabled=!(S.draft.name.trim().length>2&&S.draft.ageOk&&S.draft.signature); }
        if(key==="email"){ const b=document.querySelector('[data-a="toStory"]'); if(b) b.disabled=!/.+@.+\..+/.test(S.draft.email); }
      };
    });
    ["f-count","f-days","f-credit"].forEach(id=>{
      const n=document.getElementById(id);
      if(n && S.draft.tfp) n.oninput=()=>{ const k=id.split("-")[1];
        S.draft.tfp[k==="count"?"count":k==="days"?"days":"credit"] = (k==="credit")?n.value:Math.max(1,parseInt(n.value||"1",10)); };
    });
    const fp=document.getElementById("f-photo");
    if(fp) fp.onchange=async()=>{ const f=fp.files&&fp.files[0]; if(!f) return;
      const img=new Image();
      img.onload=()=>{ const sc=Math.min(1,520/Math.max(img.width,img.height));
        const c2=document.createElement("canvas"); c2.width=Math.round(img.width*sc); c2.height=Math.round(img.height*sc);
        c2.getContext("2d").drawImage(img,0,0,c2.width,c2.height);
        S.draft.photo=c2.toDataURL("image/jpeg",0.6); render(); };
      img.src=URL.createObjectURL(f); };
  }

  // ——— voice memo recorder ———
  let recMedia=null, recChunks=[], recTick=null, recSecs=0;
  async function startRec(){
    if(!navigator.mediaDevices || !window.MediaRecorder){ alert(t().recDenied); return; }
    try{
      const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
      recChunks=[]; recSecs=0;
      recMedia = new MediaRecorder(stream);
      recMedia.ondataavailable = e=>{ if(e.data && e.data.size) recChunks.push(e.data); };
      recMedia.onstop = ()=>{
        stream.getTracks().forEach(tr=>tr.stop());
        const blob = new Blob(recChunks, { type: recMedia.mimeType || "audio/webm" });
        const fr = new FileReader();
        fr.onload = async ()=>{ if(S.draft){ S.draft.audio = fr.result; await saveEnc(S.draft); } S.recOn=false; render(); };
        fr.readAsDataURL(blob);
      };
      recMedia.start();
      S.recOn=true; render();
      recTick=setInterval(()=>{
        recSecs++;
        const el=document.getElementById("rec-timer");
        if(el) el.textContent = recSecs+"s";
        if(recSecs>=75) stopRec();
      },1000);
    }catch(err){ alert(t().recDenied); }
  }
  function stopRec(){
    if(recTick){ clearInterval(recTick); recTick=null; }
    if(recMedia && recMedia.state!=="inactive") recMedia.stop();
  }

      }
      S.draft=null; S.encs=await loadEncs();
      S.view = (a==="closeNew") ? "type" : "home";
      render();
    }
    else if(a==="open"){ S.sel=S.encs.find(e=>e.id===v); S.note=""; if(S.sel){ S.view="detail"; render(); } }
    else if(a==="syncOne"){
      const r = await syncEnc(S.sel);
      S.note = r.ok ? t().syncSent : t().syncFail;
      alert(r.ok ? ("\u2713 "+t().syncSent) : ("\u2717 "+t().syncFail+(r.msg?"\n\n"+r.msg:"")));
      render();
    }
    else if(a==="proofsOne"){
      if(window.confirm(t().proofsConfirm)){
        const r = await sendAction({ action:"proofs", record:S.sel });
        alert(r.ok ? ("\u2713 "+t().proofsSent) : ("\u2717 "+t().syncFail+(r.msg?"\n\n"+r.msg:"")));
        render();
      }
    }
    else if(a==="deliverOne"){
      if(window.confirm(t().deliverConfirm)){
        const r = await sendAction({ action:"deliver", record:S.sel });
        if(r.ok){
          alert("\u2713 "+t().deliverSent);
          if(S.sel.status!=="Published"){ S.sel.status="Delivered"; await saveEnc(S.sel); }
        } else alert("\u2717 "+t().syncFail+(r.msg?"\n\n"+r.msg:""));
        render();
      }
    }
    else if(a==="recStart"){ startRec(); }
    else if(a==="recStop"){ stopRec(); }
    else if(a==="leadOpen"){ S.note=""; S.ld={name:"",email:"",ig:"",where:"",note:""}; S.view="leadv"; render(); }
    else if(a==="leadSend"){
      const gv=id=>{ const el4=document.getElementById(id); return el4?el4.value.trim():""; };
      S.ld={ name:gv("f-l-name"), email:gv("f-l-email"), ig:gv("f-l-ig"), where:gv("f-l-where"), note:gv("f-l-note") };
      if(!S.ld.name || !S.ld.email){ alert(t().leadNeed); return; }
      const r = await sendAction({ action:"lead", record:{ id:"L"+Date.now(), createdAt:new Date().toISOString(), lang:S.lang,
        name:S.ld.name, email:S.ld.email, ig:S.ld.ig, where:S.ld.where, note:S.ld.note } });
      if(r.ok){ S.note="\u2601 "+t().leadSent; S.ld={name:"",email:"",ig:"",where:"",note:""}; }
      else { alert("\u2717 "+t().syncFail+(r.msg?"\n\n"+r.msg:"")); }
      render();
    }
    else if(a==="qpost"){ S.note=""; S.view="qpost"; render(); }
    else if(a==="qMood"){ S.qMood=v; S.qVar=0; S.note=""; render(); }
    else if(a==="qVary"){ S.qVar=(S.qVar||0)+1; S.note=""; render(); }
    else if(a==="copyQC" || a==="copyQT"){
      const el3=document.getElementById(a==="copyQC"?"q-cap":"q-tags");
      const txt3=el3?el3.value:"";
      try{ await navigator.clipboard.writeText(txt3); S.note=t().pkCopied; }
      catch(err){ if(el3){ el3.select(); try{ document.execCommand("copy"); S.note=t().pkCopied; }catch(e3){ S.note="\u26a0"; } } }
      render();
    }
    else if(a==="pubKit"){ S.note=""; S.view="pubkit"; render(); }
    else if(a==="backDetail"){ S.note=""; S.view="detail"; render(); }
    else if(a==="copyCap" || a==="copyTags"){
      const el2=document.getElementById(a==="copyCap"?"pk-cap":"pk-tags");
      const txt=el2?el2.value:"";
      try{ await navigator.clipboard.writeText(txt); S.note=t().pkCopied; }
      catch(err){ if(el2){ el2.select(); try{ document.execCommand("copy"); S.note=t().pkCopied; }catch(e2){ S.note="\u26a0"; } } }
      render();
    }
    else if(a==="markPub"){ S.sel.status="Published"; await saveEnc(S.sel); sendAction({ action:"status", record:{ id:S.sel.id, status:"Published" } }); S.view="detail"; render(); }
    else if(a==="advance"){ S.sel.status = (S.sel.status==="Delivered") ? "Published" : "Delivered"; await saveEnc(S.sel); sendAction({ action:"status", record:{ id:S.sel.id, status:S.sel.status } }); render(); }
    else if(a==="erase"){ if(!window.confirm(t().eraseC)) return;
      try{ await store.delete("enc:"+S.sel.id); }catch(_){}
      S.sel=null; S.encs=await loadEncs(); S.view="home"; render(); }
  });

  // ——— boot ———
  (async()=>{
    try{ const r=await store.get("pref:lang"); if(r&&(r.value==="it"||r.value==="en")) S.lang=r.value; }catch(_){}
    try{ const c=await store.get("pref:cfg"); if(c){ const p=JSON.parse(c.value); if(p&&typeof p==="object") S.cfg={url:p.url||"",auto:p.auto!==false}; } }catch(_){}
    S.encs=await loadEncs(); S.loading=false; render();
  })();
  render();
})();
</script>
